<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>细胞进化游戏</title>

<style>

body{
margin:0;
background:#08152f;
overflow:hidden;
font-family:sans-serif;
}

#score{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:22px;
z-index:10;
}

canvas{
display:block;
}

</style>

</head>

<body>

<div id="score">Score:0</div>

<canvas id="game"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script>

const {Engine,Render,Runner,World,Bodies,Events,Body} = Matter;

const engine = Engine.create();
const world = engine.world;

const canvas = document.getElementById("game");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const render = Render.create({
canvas:canvas,
engine:engine,
options:{
width:canvas.width,
height:canvas.height,
wireframes:false,
background:"#08152f"
}
});

Render.run(render);
Matter.Events.on(render, "afterRender", function(){

let ctx = render.context;

cells.forEach(cell=>{

let label = types[cell.label];

if(!label) return;

ctx.fillStyle="white";
ctx.font="12px sans-serif";
ctx.textAlign="center";

ctx.fillText(
label,
cell.position.x,
cell.position.y+4
);

});

});
const runner = Runner.create();
Runner.run(runner,engine);

let score=0;

function addScore(n){
score+=n;
document.getElementById("score").innerText="Score:"+score;
}

const ground = Bodies.rectangle(
canvas.width/2,
canvas.height,
canvas.width,
40,
{isStatic:true}
);

World.add(world,ground);

let cells=[];

const types=[
"精原细胞",
"初级精母细胞",
"次级精母细胞",
"精细胞",
"精子",
"卵原细胞",
"初级卵母细胞",
"次级卵母细胞",
"卵细胞",
"受精卵"
];

function spawn(x,type=0){

let r=20+type*3;

let color="#3bb4ff";

if(type==4) color="#ffe08a";
if(type==8) color="#ffd95a";
if(type==9) color="#8cff9c";

let body=Bodies.circle(
x,
60,
r,
{
label:type,
restitution:0.2,
render:{fillStyle:color}
}
);

cells.push(body);
World.add(world,body);

}

canvas.addEventListener("click",e=>{
spawn(e.clientX,Math.floor(Math.random()*4));
});

canvas.addEventListener("touchstart",e=>{
let x=e.touches[0].clientX;
spawn(x,Math.floor(Math.random()*4));
});

Events.on(engine,"collisionStart",function(e){

let pairs=e.pairs;

pairs.forEach(pair=>{

let a=pair.bodyA;
let b=pair.bodyB;

if(a.label===b.label && a.label<8){

let newType=a.label+1;

World.remove(world,a);
World.remove(world,b);

spawn(a.position.x,newType);

addScore(10);

}

if(
(a.label==4 && b.label==8) ||
(a.label==8 && b.label==4)
){

World.remove(world,a);
World.remove(world,b);

spawn(a.position.x,9);

addScore(100);

alert("受精成功！生成受精卵");

}

});

});

</script>

</body>
</html>
